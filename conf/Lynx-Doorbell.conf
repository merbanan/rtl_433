# GN Resound / AB Transistor Lynx Door Transmitter (wireless doorbell)
#
# https://github.com/merbanan/rtl_433/issues/3042
# https://cdn.abicart.com/shop/ws15/43915/art55/28693455-c3a9ad-Lynx_Door_Transmitter_Manual_En_De_Fr_It_Ne_No_Sv_2014-06.pdf
#
# 13 bits of (leading gap) PWM, 1000/2000 us pulses, 3000 us bit width.
# Decoded here as OOK_PCM with a 3-symbol group per logical bit (short=long,
# 1016 us) since flex has no direct "gap width modulation" primitive; the
# leading preamble bit and 3 trailing gap symbols are consumed as part of
# that framing, giving 1 + 12*3 + 3 = 40 raw symbols per transmission.
#
# The `id`/`match` split follows the product manual, which suggests the top
# bits are a static product code shared by every unit of this model, not a
# per-remote identifier -- confirmed against real captures from two
# independent remotes (issues #3042 and the original reporter in the
# decoder thread): the same match value works for both, and a wrong match
# value decodes nothing.
#
# The 4-bit button code is bit-reversed on the wire; the get mapping below
# undoes that so `button` reads as the digit printed on the remote (0-9, A-F).
#
# Analyzed by @zuckschwerdt and @klohner in issue #3042

decoder {
    name          = Lynx-Doorbell,
    modulation    = OOK_PCM,
    short         = 1016,
    long          = 1016,
    reset         = 3048,
    bits         >= 40,
    bits         <= 41,
    match         = {24}24b659,
    preamble      = {1}8,
    symbol_zero   = {3}2,
    symbol_one    = {3}6,
    get           = id:@4:{8}:%d,
    get           = button:@0:{4}:[0:0 1:8 2:4 3:C 4:2 5:A 6:6 7:E 8:1 9:9 10:5 11:D 12:3 13:B 14:7 15:F],
}
