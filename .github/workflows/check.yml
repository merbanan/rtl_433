name: Build Analyze Check
on: [push, pull_request]
jobs:
  macos_check_job:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    name: Build on ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Setup
        run: brew install soapysdr librtlsdr
      - name: Configure
        run: cmake -B build
      - name: Build
        run: cmake --build build

  build_check_job:
    runs-on: ubuntu-latest
    name: Build with CMake
    steps:
      - uses: actions/checkout@v5
      - name: Setup
        run: |
          sudo apt-get update -q -y
          sudo apt-get install -q -y --no-install-recommends cmake ninja-build
          sudo apt-get install -q -y libsoapysdr-dev librtlsdr-dev
      - name: Configure CMake+Ninja
        run: cmake -GNinja -B ${{ runner.workspace }}/b/ninja -DENABLE_RTLSDR=OFF -DENABLE_SOAPYSDR=OFF
      - name: Build CMake+Ninja
        run: cmake --build ${{ runner.workspace }}/b/ninja
      - name: Configure CMake+UnixMakefiles
        run: cmake -G"Unix Makefiles" -B ${{ runner.workspace }}/b/unixmakefiles -DENABLE_RTLSDR=OFF -DENABLE_SOAPYSDR=OFF
      - name: Build CMake+UnixMakefiles
        run: cmake --build ${{ runner.workspace }}/b/unixmakefiles

  doc_check_job:
    runs-on: ubuntu-latest
    name: Build documentation
    steps:
      - uses: actions/checkout@v5
      - name: Install Doxygen
        run: |
          sudo apt-get update -q -y
          sudo apt-get install -q -y --no-install-recommends cmake ninja-build
          sudo apt-get install -q -y doxygen
      - name: Configure CMake+Ninja
        run: cmake -GNinja -B ${{ runner.workspace }}/b/ninja -DBUILD_DOCUMENTATION=ON -DENABLE_RTLSDR=OFF -DENABLE_SOAPYSDR=OFF
      - name: Build CMake+Ninja
        run: cmake --build ${{ runner.workspace }}/b/ninja -- doc_doxygen

  style_check_job:
    runs-on: ubuntu-latest
    name: Check code style
    steps:
      - uses: actions/checkout@v5
      - name: Style Check
        uses: ./.github/actions/style-check

  maintainer_update_check_job:
    runs-on: ubuntu-latest
    name: Needs maintainer_update
    steps:
      - uses: actions/checkout@v5
      - name: Working directory clean excluding untracked files
        run: |
          ./maintainer_update.py
          [ -z "$(git status --untracked-files=no --porcelain)" ]

  symbolizer_check_job:
    runs-on: ubuntu-latest
    name: Check symbol errors
    steps:
      - uses: actions/checkout@v5
      - name: Symbolizer report
        run: |
          ./tests/symbolizer.py check

  coverage_check_job:
    runs-on: ubuntu-latest
    name: Run tests with code coverage
    steps:
      - uses: actions/checkout@v5
      - name: Setup
        run: |
          sudo apt-get update -q -y
          sudo apt-get install -q -y --no-install-recommends cmake gcovr curl python3
      - name: Build with coverage and run tests
        # Builds with -DENABLE_COVERAGE=ON, runs ctest (incl. the HTTP server
        # integration/dataflow/ws tests), and writes an HTML report. Exits
        # non-zero if any test fails.
        run: ./tests/coverage.sh "$GITHUB_WORKSPACE/build-coverage"
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build-coverage/coverage-report
          if-no-files-found: warn

  analyzer_check_job:
    # https://github.com/actions/virtual-environments
    # - Ubuntu 24.04 ubuntu-24.04
    # - Ubuntu 22.04 ubuntu-22.04
    # - Ubuntu 20.04 ubuntu-20.04
    # https://apt.llvm.org/
    # - Noble (24.04)
    # - Jammy (22.04)
    # - Focal (20.04)
    # - Bionic (18.04)
    runs-on: ubuntu-24.04
    name: Analyze with Clang
    steps:
      - uses: actions/checkout@v5
      - name: Install Clang
        run: |
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key 2>/dev/null | sudo apt-key add -
          sudo add-apt-repository 'deb http://apt.llvm.org/noble/ llvm-toolchain-noble-20 main' -y
          sudo apt-get update -q
          sudo apt-get install -q -y clang-20 lld-20 libc++-20-dev libc++abi-20-dev clang-tools-20
      - name: Clang Analyzer
        # excludes include/mongoose.h src/mongoose.c include/jsmn.h src/jsmn.c
        # exit code 1 if there is output
        run: |
          clang -Iinclude -DTHREADS --analyze -Xanalyzer -analyzer-output=text -Xanalyzer -analyzer-disable-checker=deadcode.DeadStores include/[a-ikln-z]*.h src/[a-ikln-z]*.c src/devices/*.c 2>&1 | tee analyzer.out
          [ ! -s analyzer.out ]

  sample_tests_gate_job:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    name: Sample regression (pinned baseline, ${{ matrix.runner }})
    steps:
      - uses: actions/checkout@v5
      - name: Setup
        run: |
          sudo apt-get update -q -y
          sudo apt-get install -q -y --no-install-recommends cmake ninja-build python3-venv
          python3 -m venv .venv
          .venv/bin/pip install -q deepdiff==4.0.9
      - name: Build rtl_433
        run: |
          cmake -GNinja -B build -DENABLE_RTLSDR=OFF -DENABLE_SOAPYSDR=OFF
          cmake --build build
      - name: Shallow-fetch pinned rtl_433_tests
        run: |
          SHA="$(cat tests/rtl_433_tests_pinned_sha.txt)"
          mkdir rtl_433_tests && cd rtl_433_tests && git init -q \
            && git remote add origin https://github.com/merbanan/rtl_433_tests \
            && git fetch --depth 1 -q origin "$SHA" \
            && git checkout -q FETCH_HEAD
      - name: Run gated sample tests
        # Fails only when a capture in tests/rtl_433_tests_baseline.txt regresses.
        # Newly-passing captures are reported to the step summary, never fatal.
        run: |
          .venv/bin/python tests/rtl_433_tests_regression.py \
            --rtl433 build/src/rtl_433 \
            --conf ./conf \
            --tests rtl_433_tests/tests \
            --runner rtl_433_tests/bin/run_test.py \
            --baseline tests/rtl_433_tests_baseline.txt

  sample_tests_master_job:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    name: Sample regression (master, informational, ${{ matrix.runner }})
    # Informational only: tracks the latest samples, never blocks the build.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - name: Setup
        run: |
          sudo apt-get update -q -y
          sudo apt-get install -q -y --no-install-recommends cmake ninja-build python3-venv
          python3 -m venv .venv
          .venv/bin/pip install -q deepdiff==4.0.9
      - name: Build rtl_433
        run: |
          cmake -GNinja -B build -DENABLE_RTLSDR=OFF -DENABLE_SOAPYSDR=OFF
          cmake --build build
      - name: Shallow-clone rtl_433_tests master
        run: git clone --depth 1 https://github.com/merbanan/rtl_433_tests rtl_433_tests
      - name: Run informational sample tests
        run: |
          .venv/bin/python rtl_433_tests/bin/run_test.py -c build/src/rtl_433 -C ./conf -t rtl_433_tests/tests -I time --first-line | tee summary.txt
          { echo '### rtl_433_tests (master) — informational'; echo '```'; tail -n 40 summary.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
