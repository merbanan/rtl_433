# Mercator ceiling fan remote control (e.g. FRM87GL)
#
# See https://github.com/merbanan/rtl_433/issues/2200
#
# Protocol reverse engineered by @klohner, confirmed working against real
# captures (5 buttons: Light, Off, Low, Med, Hi) by the original reporter.
#
# OOK_PCM, 43 bit message with 3-chip symbols (one={3}0b110, zero={3}0b010),
# a 1 bit preamble, and a fixed 20 bit sync word right after it.
#
# Data layout:
#
#     button (6 bit, one-hot) at bit offset 6

decoder {
    name=Mercator,
    modulation=OOK_PCM,
    short=333,
    long=333,
    reset=2000,
    match={20}b6db2,
    preamble={1}8,
    bits=43,
    symbol_one={3}6,
    symbol_zero={3}2,
    get=Button:@6:{6}:[1:LIGHT 2:OFF 4:UNKNOWN 8:LOW 16:MED 32:HI],
}
