# Decoder for the JCHENG SECURITY door/window contact sensor
#
# See https://github.com/merbanan/rtl_433/pull/3448
#
# OOK PWM, fixed 25-bit message, no checksum. No test recordings were
# available at time of writing; this is a straight translation of the
# native decoder proposed in that PR into a flex config, since there is
# nothing to validate beyond the fixed-preamble/bit-position check.
#
# Data layout:
#
#     PPPP IIII IIII IIII IIII OBS XX
#
# - P: 4 bit preamble, fixed 0xF
# - I: 16 bit sensor ID
# - O: 1 bit event/is_on flag
# - B: 1 bit battery_ok (1 = OK)
# - S: 1 bit state (1 = closed, 0 = open)
# - X: 2 bit unused

decoder {
    n=JCHENG-Contact,
    m=OOK_PWM,
    s=400,
    l=1200,
    r=1260,
    g=1400,
    bits=25,
    match={4}f,
    get=id:@4:{16},
    get=event:@20:{1},
    get=battery_ok:@21:{1},
    get=closed:@22:{1},
}
