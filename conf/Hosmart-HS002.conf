# Decoder for the Hosmart HS002 rechargeable driveway alert (PIR)
# also sold as eMacros.
#
#   https://www.amazon.co.uk/Rechargable-Weatherproof-Driveway-Wireless-Detector-1-receiver-Sensor/dp/B07DSB5HYJ
#
# See https://github.com/merbanan/rtl_433/issues/1689
#
# Protocol reverse engineered by @sbalabanov.
#
# The sensor sends a 25 bit message, FSK PWM modulated (inverted),
# repeated about 6-7 times whenever motion is detected.
#
# Data layout (after inverting):
#
#     IIII IIII IIII MMMM MMMM CCCC B
#
# - I: 12 bit device id
# - M: 8 bit model id
# - C: 4 bit channel
# - B: 1 bit battery status, 0 means OK

decoder {
    n=Hosmart-HS002,
    m=FSK_PWM,
    s=416,
    l=1248,
    r=14240,
    g=1252,
    t=332,
    y=0,
    bits=25,
    invert,
    repeats>=3,
    unique,
    get=id:@0:{12},
    get=model_id:@12:{8},
    get=channel:@20:{4},
    get=battery_ok:@24:{1}:[0:1 1:0],
}
