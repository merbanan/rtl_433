# Fanimation ceiling fan/light remote control
#
# https://github.com/merbanan/rtl_433/issues/3033
# FCC ID KUJCE10711 (https://fcc.report/FCC-ID/KUJCE10711/4100428)
#
# OOK_PWM, 25 bit fixed-code frame, no rolling code:
#
#     PPPPPPPPPPPP DDDDD CCCCCCCC
#
# - P: 12 bit constant preamble (always 0x800)
# - D: 5 bit dip switch setting (pairs remote to fan/light receiver)
# - C: 8 bit command byte
#
# Verified against 14 real captures attached to the issue (dip switch
# 00011 throughout): every capture decodes to the expected preamble and
# dip switch value, and the command byte exactly matches the values
# below, independently derived from the raw IQ.
#
# Known command byte values (decimal), from the issue plus the reporter's
# own bitbench-verified dial sweep:
#   0           Fan On/Off
#   65-95 (odd) Fan speed, low to high (16 steps)
#   128         Light Off
#   135-178     Light Brightness, low (135) to high (178) (44 steps)
#   102         Light Color Temperature (cycles through presets)
#   33          1 Hour Timer
#   34          3 Hour Timer
#   35          6 Hour Timer
#   100         Away Mode (simulates random on/off)
#   58          Natural Breeze Mode
#   101         1 Minute Timer ("Person" quick-off)
#   99          Winter Mode (counter-clockwise)
#   98          Summer Mode (clockwise)

decoder {
    n=Fanimation-Fan,
    m=OOK_PWM,
    s=400,
    l=800,
    g=1000,
    r=12000,
    bits=25,
    preamble={12}0x800,
    get=@0:{5}:id,
    get=@5:{8}:cmd,
    unique
}
