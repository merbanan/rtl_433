# Decoder for the JNStar / JNWR solar dual-beam driveway infrared alarm
#
#   https://www.ebay.co.uk/itm/Solar-Dual-Beam-Driveway-Alarm-20m-Wireless-Infrared-Dual-Beams-JNStar-JNWR-6/303120336342
#
# See https://github.com/merbanan/rtl_433/issues/1689
#
# Fixed 25-bit code, OOK PWM, repeated about 30-50 times whenever the beam
# is broken. Only one unit was tested, so this decoder just matches that
# unit's code (no known id/data split); replace the match= value with
# your own unit's code, found with:
#   $ rtl_433 -X 'n=jnstar,m=OOK_PWM,s=180,l=390,r=4000,g=500,bits=25,repeats>=3'

decoder {
    n=JNStar-Beam,
    m=OOK_PWM,
    s=180,
    l=390,
    r=4000,
    g=500,
    bits=25,
    repeats>=3,
    match={25}d0930f8,
    countonly,
}
