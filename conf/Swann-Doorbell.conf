# Swann SWHOM-DC820P Wireless Doorbell Chime
#
# https://support.swann.com/hc/en-us/articles/4645286448153-HOM-DC820P-User-Manual
#
# A typical EV1527-style OOK PWM device with no CRC or checksum, so the
# button press is validated purely by repeat count. A full transmission
# repeats the same 25-bit row about 47-65 times (long enough that rtl_433
# will typically split it into two detected packages), so "repeats>=25" is
# required both to see a complete transmission and to avoid decoding
# noise given there is no other integrity check.
#
# rtl_433 -R 0 -c conf/Swann-Doorbell.conf
#
# Analyzed by @tom-hooper and @klohner in issue #2784

decoder {
        name        = Swann-Doorbell,
        modulation  = OOK_PWM,
        short       = 190,
        long        = 570,
        gap         = 660,
        reset       = 6000,
        bits        = 25,
        repeats    >= 25,
        unique,
        get         = @0:{24}:id,
}
