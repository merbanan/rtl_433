# DY-SQ100B water leak detector (EV1527 variant)
#
# https://github.com/merbanan/rtl_433/issues/2606
#
# Some units sold under this listing use a different RF chip than the one
# in conf/LeakDetector.conf (33 bit, short=316/long=968) -- this variant
# is a classic EV1527-style fixed-code PWM transmitter, confirmed against
# two real captures in issue #2606: short ~500 us, long ~1500 us, a
# constant ~2048 us bit period, 24 data bits plus an optional leading
# sync bit (giving 24 or 25 bits depending on capture alignment).
#
# Only a fixed 24 bit code was ever observed (no variation across many
# repeats in either capture) -- no alarm/battery/heartbeat sub-field
# could be confirmed, so this reports the whole code as-is rather than
# guessing a bit layout. Every capture seen was mid-alarm; a capture of
# a different state (if one exists for this device) would be needed to
# find any further structure.

decoder {
    n=DY-SQ100B-WaterLeak-EV1527,
    m=OOK_PWM,
    s=500,
    l=1500,
    r=2000,
    bits>=24,
    bits<=25,
    get=@0:{24}:code,
    unique
}
