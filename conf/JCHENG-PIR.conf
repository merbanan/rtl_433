# Decoder for the JCHENG SECURITY PIR motion sensor
#
# See https://github.com/merbanan/rtl_433/pull/3448
#
# OOK PWM, fixed 25-bit message, no checksum. The PR author no longer has
# this device and could not provide test recordings; this is a straight
# translation of the native decoder proposed in that PR into a flex
# config, since there is nothing to validate beyond the fixed-preamble/
# bit-position check.
#
# Data layout:
#
#     PPPP PPPP IIII IIII IIII TMB XX
#
# - P: 8 bit preamble, fixed 0xAA
# - I: 12 bit sensor ID
# - T: 1 bit tamper flag
# - M: 1 bit motion detected
# - B: 1 bit battery_low (1 = low), reported here inverted as battery_ok
# - X: 2 bit unused

decoder {
    n=JCHENG-PIR,
    m=OOK_PWM,
    s=400,
    l=1200,
    r=12000,
    g=1400,
    bits=25,
    match={8}aa,
    get=id:@8:{12},
    get=tamper:@20:{1},
    get=motion:@21:{1},
    get=battery_ok:@22:{1}:[0:1 1:0],
}
