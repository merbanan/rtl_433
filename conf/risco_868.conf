# RISCO 868.64MHz OOK wireless alarm sensors (e.g. RWT71V2 door/window sensor)
# https://github.com/merbanan/rtl_433/issues/1194

# -X "n=Risco_868_Security,m=OOK_DMC,s=750,l=1500,t=400,r=3000,preamble={6}04,bits>=37,bits<=42,get=ID:@0:{24},get=Trigger:@24:{1}:[0:supervision 1:EVENT],get=State:@25:{1}:[0:ok 1:ALERT],get=Tamper:@26:{1}:[0:normal 1:ALERT]"

decoder {
    name=Risco_868_Security,
    modulation=OOK_DMC,
    short=750,
    long=1500,
    tolerance=400,
    reset=3000,
    preamble={6}04,
    bits>=37,
    bits<=42,
    get=ID:@0:{24},
    get=Trigger:@24:{1}:[0:supervision 1:EVENT],
    get=State:@25:{1}:[0:ok 1:ALERT],
    get=Tamper:@26:{1}:[0:normal 1:ALERT]
}
